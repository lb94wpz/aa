<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏导航 - Game Navigator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="crt-overlay"></div>
    
    <div class="game-container">
        <header class="game-header">
            <h1 class="pixel-title">🎮 游戏导航站</h1>
            <div class="instructions">
                <span>使用 ←→ 方向键左右移动（连续按键加速）</span>
                <span class="blink">空格键或↑跳跃 | 靠近网站卡片访问</span>
            </div>
        </header>

        <div class="game-map" id="gameMap">
            <!-- 玩家角色 -->
            <div class="player" id="player">
                <div class="player-sprite">
                    <div class="mario">
                        <div class="mario-hat"></div>
                        <div class="mario-face"></div>
                        <div class="mario-body"></div>
                    </div>
                </div>
                <div class="player-shadow"></div>
            </div>

            <!-- 网站卡片将通过 JS 动态生成 -->
        </div>

        <div class="info-panel" id="infoPanel">
            <div class="info-content">
                <h2 id="siteName">网站名称</h2>
                <p id="siteDescription">网站描述</p>
                <a id="siteLink" href="#" target="_blank" class="visit-btn">访问网站 →</a>
            </div>
        </div>

        <!-- 对话框 -->
        <div class="site-dialog" id="siteDialog">
            <div class="dialog-overlay"></div>
            <div class="dialog-content">
                <h2 id="dialogSiteName">网站名称</h2>
                <div class="dialog-url">
                    <span>URL:</span>
                    <p id="dialogSiteUrl">https://example.com</p>
                </div>
                <p id="dialogSiteDescription" class="dialog-description">网站描述</p>
                <div class="dialog-buttons">
                    <button id="dialogOpenBtn" class="dialog-btn dialog-btn-primary">打开网站</button>
                    <button id="dialogCancelBtn" class="dialog-btn dialog-btn-secondary">取消</button>
                </div>
            </div>
        </div>

        <footer class="game-footer">
            <div class="stats">
                <span>网站数量：<span id="siteCount">0</span></span>
            </div>
        </footer>
    </div>

    <script src="sites.js"></script>
    <script src="game.js"></script>
</body>
</html>
