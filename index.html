<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏导航 - Game Navigator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- 浮动 HUD -->
        <div class="game-hud">
            <div class="hud-title">🎮 游戏导航站</div>
            <div class="coin-counter" id="coinCounter">💰×<span id="coinCount">0</span></div>
            <div class="hud-stats">网站 <span id="siteCount">0</span></div>
        </div>

        <!-- 帮助按钮 - 右上角书本图标 -->
        <button class="help-btn" id="helpBtn" title="操作指南">📖</button>

        <div class="game-map" id="gameMap">
            <!-- 玩家角色 -->
            <div class="player" id="player">
                <div class="player-shadow"></div>
                <div class="player-transform-wrapper">
                    <div class="player-sprite">
                        <div class="mario">
                            <div class="mario-hat"></div>
                            <div class="mario-face"></div>
                            <div class="mario-body"></div>
                        </div>
                    </div>
                </div>
                <div class="player-bubble" id="playerBubble">
                    <div class="bubble-content" id="bubbleContent"></div>
                    <div class="bubble-tail"></div>
                </div>
            </div>

            <!-- 网站卡片将通过 JS 动态生成 -->
        </div>

        <!-- 对话框 -->
        <div class="site-dialog" id="siteDialog">
            <div class="dialog-overlay"></div>
            <div class="dialog-content">
                <h2 id="dialogSiteName">网站名称</h2>
                <div class="dialog-url">
                    <span>URL:</span>
                    <p id="dialogSiteUrl">https://example.com</p>
                </div>
                <p id="dialogSiteDescription" class="dialog-description">网站描述</p>
                <div class="dialog-buttons">
                    <button id="dialogOpenBtn" class="dialog-btn dialog-btn-primary">打开网站</button>
                    <button id="dialogCancelBtn" class="dialog-btn dialog-btn-secondary">取消</button>
                </div>
            </div>
        </div>

        <!-- 帮助对话框 -->
        <div class="help-dialog" id="helpDialog">
            <div class="dialog-overlay"></div>
            <div class="help-content">
                <button class="help-close" id="helpClose">✕</button>
                <h2>🎮 操作指南</h2>
                <div class="help-list">
                    <div class="help-item">
                        <span class="help-key">← →</span>
                        <span class="help-desc">左右移动（连续按键加速）</span>
                    </div>
                    <div class="help-item">
                        <span class="help-key">空格 / ↑</span>
                        <span class="help-desc">跳跃（支持二段跳）</span>
                    </div>
                    <div class="help-item">
                        <span class="help-key">ESC</span>
                        <span class="help-desc">关闭对话框</span>
                    </div>
                    <div class="help-item">
                        <span class="help-key">🔴</span>
                        <span class="help-desc">顶变大蘑菇角色变大</span>
                    </div>
                    <div class="help-item">
                        <span class="help-key">🔵</span>
                        <span class="help-desc">顶变小蘑菇角色变小</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="sites.js"></script>
    <script src="game.js"></script>
</body>
</html>
